paths:
  /auth/signin:
    post:
      tags: [Autenticacion]
      summary: Registrar un nuevo usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - name
                - email
                - password
              properties:
                username:
                  type: string
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: Usuario registrado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      isAdmin:
                        type: boolean
        '400':
          description: Faltan campos obligatorios o error de validacion
        '409':
          description: El usuario o email ya existe

  /auth/login:
    post:
      tags: [Autenticacion]
      summary: Iniciar sesion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Inicio de sesion exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      isAdmin:
                        type: boolean
        '400':
          description: Usuario y contrasena requeridos
        '401':
          description: Credenciales invalidas

  /auth/recoverPass:
    post:
      tags: [Autenticacion]
      summary: Solicitar recuperacion de contrasena
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Correo de recuperacion enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Email requerido

  /auth/resetPassword:
    post:
      tags: [Autenticacion]
      summary: Restablecer contrasena
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: Contrasena actualizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Token invalido, expirado o faltan datos
