paths:
  /users:
    get:
      tags: [Usuarios]
      summary: Obtener todos los usuarios
      description: Endpoint reservado a usuarios administradores.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Token no proporcionado
        '403':
          description: Acceso solo para administradores
    post:
      tags: [Usuarios]
      summary: Crear un nuevo usuario
      description: Endpoint reservado a usuarios administradores.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUser'
      responses:
        '201':
          description: Usuario creado correctamente
        '401':
          description: Token no proporcionado
        '403':
          description: Acceso solo para administradores

  /users/{id}:
    put:
      tags: [Usuarios]
      summary: Actualizar usuario
      description: Permitido para el propio usuario o para administradores.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Acceso denegado
        '404':
          description: Usuario no encontrado
    delete:
      tags: [Usuarios]
      summary: Eliminar usuario
      description: Endpoint reservado a usuarios administradores.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario eliminado correctamente
        '403':
          description: Acceso solo para administradores
        '404':
          description: Usuario no encontrado
components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        favourites:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NewUser:
      type: object
      required:
        - username
        - name
        - email
        - password
      properties:
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [user, admin]
          default: user
    UserUpdate:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
