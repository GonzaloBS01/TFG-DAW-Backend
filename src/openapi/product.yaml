paths:
  /products:
    get:
      tags: [Productos]
      summary: Obtener todos los productos
      responses:
        '200':
          description: Lista de productos obtenida correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      tags: [Productos]
      summary: Crear un nuevo producto
      description: Endpoint reservado a administradores. Acepta JSON o multipart/form-data con hasta 10 imagenes en el campo images.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductMultipartInput'
      responses:
        '201':
          description: Producto creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '403':
          description: Acceso solo para administradores

  /products/{id}:
    get:
      tags: [Productos]
      summary: Obtener producto por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Producto no encontrado
    put:
      tags: [Productos]
      summary: Actualizar producto
      description: Endpoint reservado a administradores. Acepta JSON o multipart/form-data con hasta 10 imagenes en el campo images.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductMultipartInput'
      responses:
        '200':
          description: Producto actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '403':
          description: Acceso solo para administradores
        '404':
          description: Producto no encontrado
    delete:
      tags: [Productos]
      summary: Eliminar producto
      description: Endpoint reservado a administradores.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Producto eliminado correctamente
        '403':
          description: Acceso solo para administradores
        '404':
          description: Producto no encontrado
components:
  schemas:
    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        type:
          type: string
        destacado:
          type: boolean
        status:
          type: string
          enum: [available, sold, reserved, building]
        image:
          type: string
        images:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProductInput:
      type: object
      required:
        - name
        - price
        - type
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        type:
          type: string
        destacado:
          type: boolean
        status:
          type: string
          enum: [available, sold, reserved, building]
        image:
          type: string
        images:
          type: array
          items:
            type: string
    ProductMultipartInput:
      allOf:
        - $ref: '#/components/schemas/ProductInput'
        - type: object
          properties:
            images:
              type: array
              items:
                type: string
                format: binary
    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        type:
          type: string
        destacado:
          type: boolean
        status:
          type: string
          enum: [available, sold, reserved, building]
        image:
          type: string
        images:
          type: array
          items:
            type: string
