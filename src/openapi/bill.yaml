paths:
  /bills:
    post:
      tags: [Facturas]
      summary: Crear una nueva factura
      description: Endpoint reservado a administradores. Normalmente las facturas se crean desde checkout.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillInput'
      responses:
        '201':
          description: Factura creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
        '400':
          description: Error de validacion
        '403':
          description: Acceso solo para administradores
    get:
      tags: [Facturas]
      summary: Obtener todas las facturas
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de facturas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bill'
        '401':
          description: Token no proporcionado

  /bills/{id}:
    get:
      tags: [Facturas]
      summary: Obtener una factura por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Factura encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
        '404':
          description: Factura no encontrada
    put:
      tags: [Facturas]
      summary: Actualizar una factura
      description: Endpoint reservado a administradores.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillInput'
      responses:
        '200':
          description: Factura actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
        '403':
          description: Acceso solo para administradores
        '404':
          description: Factura no encontrada
    delete:
      tags: [Facturas]
      summary: Eliminar una factura
      description: Endpoint reservado a administradores.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Factura eliminada
        '403':
          description: Acceso solo para administradores
        '404':
          description: Factura no encontrada

  /bills/{id}/download:
    get:
      tags: [Facturas]
      summary: Descargar factura en PDF
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF generado correctamente
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '403':
          description: El usuario no tiene permisos para descargar esta factura
        '404':
          description: Factura no encontrada
        '500':
          description: Error al generar el PDF
components:
  schemas:
    Bill:
      type: object
      properties:
        _id:
          type: string
        user:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/User'
        products:
          type: array
          items:
            type: object
            properties:
              product:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/Product'
              quantity:
                type: integer
              price:
                type: number
        totalAmount:
          type: number
        status:
          type: string
          enum: [pending, paid, cancelled]
        paymentMethod:
          type: string
        billingAddress:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BillInput:
      type: object
      required:
        - user
        - products
        - totalAmount
      properties:
        user:
          type: string
        products:
          type: array
          items:
            type: object
            required:
              - product
              - price
            properties:
              product:
                type: string
              quantity:
                type: integer
                default: 1
              price:
                type: number
        totalAmount:
          type: number
        status:
          type: string
          enum: [pending, paid, cancelled]
          default: pending
        paymentMethod:
          type: string
          default: card
        billingAddress:
          type: string
